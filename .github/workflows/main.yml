name: 🚀 SEVER AI STV PREMIUM

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

jobs:
  Premium-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      - name: 🚀 KHỞI TẠO VÀ CẤU HÌNH HỆ THỐNG
        run: |
          Write-Host "🔧 Đang cấu hình RDP & Firewall..."
          # Hợp nhất các lệnh registry để nhanh hơn
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          
          netsh advfirewall firewall add rule name="RDP-Premium" dir=in action=allow protocol=TCP localport=3389 profile=any
          
          Start-Service TermService -ErrorAction SilentlyContinue
          Write-Host "✅ Cấu hình hệ thống hoàn tất."

      - name: 👤 TẠO TÀI KHOẢN PREMIUM
        run: |
          $pw = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          $securePass = ConvertTo-SecureString $pw -AsPlainText -Force
          
          New-LocalUser -Name "AISTV-PREMIUM" -Password $securePass -AccountNeverExpires -Description "AI STV Premium" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "AISTV-PREMIUM"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "AISTV-PREMIUM"
          
          echo "RDP_USER=AISTV-PREMIUM" >> $env:GITHUB_ENV
          echo "RDP_PASS=$pw" >> $env:GITHUB_ENV
          Write-Host "✅ Tài khoản AISTV-PREMIUM đã sẵn sàng."

      - name: 🌐 THIẾT LẬP MẠNG TAILSCALE
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\tailscale.msi`"", "/quiet", "/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=ai-stv-premium
          
          # Lấy IP nhanh không cần vòng lặp phức tạp
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "🌐 IP nội bộ: $ip"

      - name: ⏳ DUY TRÌ PHIÊN (KHÔNG LAG)
        run: |
          Write-Host "🚀 Đang duy trì phiên làm việc. Mật khẩu: $env:RDP_PASS"
          # Thay vì chạy vòng lặp UI, chỉ cần giữ tiến trình chạy
          # Sử dụng Start-Sleep dài hơn để giảm tải CPU cho Runner
          for ($i=0; $i -lt 1000; $i++) {
              Start-Sleep -Seconds 300
              Write-Host "✅ Phiên vẫn đang hoạt động tại $(Get-Date -Format 'HH:mm:ss')"
          }

      - name: 🧹 DỌN DẸP
        if: always()
        run: |
          Disable-LocalUser -Name "AISTV-PREMIUM" -ErrorAction SilentlyContinue
          & "$env:ProgramFiles\Tailscale\tailscale.exe" down -ErrorAction SilentlyContinue
